# CI: macOS arm64 (Apple Silicon / M1+)
name: Build macOS arm64 (Apple Silicon)

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  MACOSX_DEPLOYMENT_TARGET: "11.0"

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Guard Qt Svg scope (libfm vs qtfm app)
        run: |
          if grep -E '^QT\s*\+=' share/qtfm.pri | grep -q svg; then
            echo "Qt Svg must not be in share/qtfm.pri (libfm); use fm/fm.pro only."
            exit 1
          fi
          grep -qE 'QT.*svg' fm/fm.pro || { echo "fm/fm.pro must request Qt Svg"; exit 1; }

      - name: Verify runner is Apple Silicon
        run: |
          arch="$(uname -m)"
          echo "Runner architecture: ${arch}"
          test "${arch}" = "arm64"

      - name: Install build tools and Qt 5
        run: |
          brew install autoconf automake libtool librsvg pkg-config qt@5 ffmpeg
          echo "$(brew --prefix qt@5)/bin" >> "${GITHUB_PATH}"
          echo "PKG_CONFIG_PATH=$(brew --prefix qt@5)/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "${GITHUB_ENV}"

      - name: Build libinotify-kqueue (arm64)
        run: |
          git clone --depth 1 https://github.com/libinotify-kqueue/libinotify-kqueue.git /tmp/libinotify-kqueue
          cd /tmp/libinotify-kqueue
          ./autogen.sh
          ./configure --prefix="${GITHUB_WORKSPACE}/deps-arm64"
          make -j"$(sysctl -n hw.ncpu)"
          make install
          echo "PKG_CONFIG_PATH=${GITHUB_WORKSPACE}/deps-arm64/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "${GITHUB_ENV}"

      - name: Prepare app icon from mimes/app.png
        run: |
          chmod +x share/scripts/sync-app-icon.sh share/scripts/app-icon-from-png.sh
          if [ -f share/icons/mimes/app.png ]; then
            share/scripts/sync-app-icon.sh
            share/scripts/app-icon-from-png.sh
          elif [ -f share/images/app.png ]; then
            share/scripts/app-icon-from-png.sh
          elif [ ! -f share/images/QtFM.icns ]; then
            echo "No share/icons/mimes/app.png, share/images/app.png, or QtFM.icns" >&2
            exit 1
          fi

      - name: Build (qmake release, arm64)
        run: |
          mkdir -p build
          cd build
          qmake CONFIG+=release \
            QMAKE_APPLE_DEVICE_ARCHS=arm64 \
            QMAKE_MACOSX_DEPLOYMENT_TARGET=11.0 \
            ..
          make -j"$(sysctl -n hw.ncpu)"

      - name: Verify binary
        run: |
          bin="build/fm/QtFM.app/Contents/MacOS/QtFM"
          test -f "${bin}"
          file "${bin}"
          file "${bin}" | grep arm64

      - name: Deploy Qt libraries (macdeployqt)
        run: macdeployqt build/fm/QtFM.app -always-overwrite

      - name: Bundle ffmpeg for video thumbnails
        run: |
          RES="build/fm/QtFM.app/Contents/Resources"
          mkdir -p "${RES}"
          install -m 755 "$(command -v ffmpeg)" "${RES}/ffmpeg"
          install -m 755 "$(command -v ffprobe)" "${RES}/ffprobe"

      - name: Build DMG
        run: |
          chmod +x share/scripts/make-macos-dmg.sh
          share/scripts/make-macos-dmg.sh build/fm/QtFM.app QtFM-macos-arm64.dmg QtFM

      - name: Upload QtFM DMG
        uses: actions/upload-artifact@v4
        with:
          name: QtFM-macos-arm64
          path: QtFM-macos-arm64.dmg
          if-no-files-found: error
